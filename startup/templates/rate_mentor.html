{% extends 'base_startup.html' %}

{% block content %}
<div class="panel">
    <h2>Rate Mentor</h2>
    <p class="muted">Mentor: <strong>{{ session.mentor.user.username }}</strong></p>
    <p class="muted">Topic: <strong>{{ session.topic }}</strong></p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Rating</button>
        <a href="{% url 'startup:startup_sessions' %}" class="btn btn-ghost">Cancel</a>
    </form>
</div>

<style>
.panel {
    max-width: 620px;
    margin: 30px auto;
    background: #ffffff;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
}
.muted { color: #666; }
.btn-primary {
    background: #d32f2f;
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
}
.btn-ghost {
    margin-left: 8px;
    text-decoration: none;
    color: #666;
}
</style>
{% endblock %}
