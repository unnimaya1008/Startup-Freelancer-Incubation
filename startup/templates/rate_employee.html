{% extends 'base_startup.html' %}
{% block title %}Rate Employee{% endblock %}

{% block content %}
<div class="page-container">
    <h2 class="page-title">Rate {{ employee.name }}</h2>
    <p class="muted">Project: <strong>{{ project.name }}</strong></p>

    <form method="post" class="rating-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Save Rating</button>
        <a href="{% url 'startup:employee_detail' employee.id %}" class="btn-cancel">Cancel</a>
    </form>
</div>

<style>
    .page-container { padding: 30px; }
    .page-title { font-size: 1.8rem; margin-bottom: 6px; }
    .muted { color: #666; margin-bottom: 16px; }
    .rating-form { background: #fff; padding: 20px; border-radius: 10px; max-width: 600px; }
    .rating-form input, .rating-form select, .rating-form textarea {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    .btn-submit {
        background: #2ecc71; color: #fff; padding: 8px 14px; border-radius: 6px;
        border: none; cursor: pointer; font-weight: 600; margin-right: 8px;
    }
    .btn-cancel { color: #555; text-decoration: none; }
</style>
{% endblock %}
